<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <main>
      <h1>Test</h1>
      <form>
        <label for="name">Name:</label><br />
        <input type="text" id="name" name="name" /><br /><br />
        <label for="address">Address:</label><br />
        <input type="text" id="address" name="address" />
        <br /><br />
        <label for="city">City:</label><br />
        <input type="text" id="city" name="city" />
        <br /><br />
        <label for="zip">Zip Code:</label><br />
        <input type="text" id="zip" name="zip" />
        <br /><br />
        <fieldset style="border: none; padding: 0; margin: 0;">
          <legend> Credit Card Type:</legend> <br />
          <input type="radio" id="visa" name="card" value="visa" /> 
          <label for="visa">Visa</label><br />
          <input type="radio" id="mastercard" name="card" value="mastercard" /> 
          <label for="mastercard">MasterCard</label><br />
          <input type="radio" id="amex" name="card" value="amex" /> 
          <label for="amex">American Express</label><br /><br />
        </fieldset>
        <label for="cc">Credit Card Number:</label><br />
        <input type="text" id="cc" name="cc_number" /><br /><br />
        <label for="cvv">CVC:</label><br />
        <input type="text" id="cvv" name="cvv" /><br /><br />
        <input type="button" value="Submit" />
      </form>
    </main>
  </body>
</html>
