<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="ira-page">
    <main class="ira-card">
      <h1 class="ira-title">Roth IRA Calculator</h1>
      <form class="ira-form">
        <div class="ira-field">
          <label class="ira-label" for="balance">Balance ($)</label>
          <input class="ira-input" type="text" id="balance" name="balance">
        </div>
        <div class="ira-field">
          <label class="ira-label" for="annual-contribution">Annual contribution ($)</label>
          <input class="ira-input" type="text" id="annual-contribution" name="annual-contribution">
        </div>
        <fieldset class="ira-radio-group">
          <legend class="ira-group-label">Maximize contribution?</legend>
          <div class="ira-radio-options">
            <input type="radio" id="maximize-yes" name="maximize" value="yes">
            <label for="maximize-yes">Yes</label>
            <input type="radio" id="maximize-no" name="maximize" value="no">
            <label for="maximize-no">No</label>
          </div>
        </fieldset>
        <div class="ira-field">
          <label class="ira-label" for="rate-of-return">Expected rate of return (%)</label>
          <input class="ira-input" type="number" id="rate-of-return" name="rate-of-return">
        </div>
        <div class="ira-field">
          <label class="ira-label" for="current-age">Current age</label>
          <input class="ira-input" type="number" id="current-age" name="current-age">
        </div>
        <div class="ira-field">
          <label class="ira-label" for="retirement-age">Retirement age</label>
          <input class="ira-input" type="number" id="retirement-age" name="retirement-age">
        </div>
        <div class="ira-field">
          <label class="ira-label" for="tax-rate">Marginal tax rate (%)</label>
          <input class="ira-input" type="number" id="tax-rate" name="tax-rate">
        </div>
        <div class="ira-buttons">
          <input class="ira-btn-submit" type="submit" value="Calculate">
          <input class="ira-btn-reset" type="reset" value="Reset">
        </div>
      </form>
      <p class="ira-footer">This exercise is a simplified version of the Roth IRA Calculator at <a class="ira-link" href="https://www.calculator.net/roth-ira-calculator.html">Calculator.net</a></p>
    </main>
  </body>
</html>
