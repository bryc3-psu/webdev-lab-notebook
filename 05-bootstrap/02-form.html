<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 02 - Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <div class="row justify-content-center">
        <main class="col-12 col-lg-6 bg-white border rounded p-4">

          <h1 class="text-center mb-4 fs-2">Roth IRA Calculator</h1>

          <form class="w-100">
            <div class="row mb-3">
              <label for="balance" class="col-sm-6 col-form-label">Balance ($)</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="balance" name="balance">
              </div>
            </div>

            <div class="row mb-3">
              <label for="annual-contribution" class="col-sm-6 col-form-label">Annual Contribution ($)</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="annual-contribution" name="annual-contribution">
              </div>
            </div>

            <fieldset class="row mb-3">
              <legend class="col-sm-6 col-form-label pt-0">Maximize contributions?</legend>
              <div class="col-sm-6">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="maximize" id="maximize-yes" value="yes">
                  <label class="form-check-label" for="maximize-yes">Yes</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="maximize" id="maximize-no" value="no">
                  <label class="form-check-label" for="maximize-no">No</label>
                </div>
              </div>
            </fieldset>

            <div class="row mb-3">
              <label for="expected-return" class="col-sm-6 col-form-label">Expected return (%)</label>
              <div class="col-sm-6">
                <input type="number" class="form-control" id="expected-return" name="expected-return">
              </div>
            </div>

            <div class="row mb-3">
              <label for="current-age" class="col-sm-6 col-form-label">Current age</label>
              <div class="col-sm-6">
                <input type="number" class="form-control" id="current-age" name="current-age">
              </div>
            </div>

            <div class="row mb-3">
              <label for="retirement-age" class="col-sm-6 col-form-label">Retirement age</label>
              <div class="col-sm-6">
                <input type="number" class="form-control" id="retirement-age" name="retirement-age">
              </div>
            </div>

            <div class="row mb-4">
              <label for="tax-rate" class="col-sm-6 col-form-label">Tax rate (%)</label>
              <div class="col-sm-6">
                <input type="number" class="form-control" id="tax-rate" name="tax-rate">
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-6">
                <input type="submit" class="btn btn-primary w-100" value="Calculate">
              </div>
              <div class="col-6">
                <input type="reset" class="btn btn-outline-secondary w-100" value="Reset">
              </div>
            </div>
          </form>

          <p class="mt-2">
            This exercise is a simplified version of the Roth IRA Calculator
            <a href="https://www.calculator.net/roth-ira-calculator.html">Calculator.net</a>
          </p>
        </main>
      </div>
    </div>
  </body>
</html>
